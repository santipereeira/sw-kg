dataset:
  name: "Juegos deportivos municipales (Madrid): calendario y resultados de competiciones"
  url: "https://datos.madrid.es/dataset/211549-0-juegos-deportivos-actual/information"
  description: "Conjunto de datos de los Juegos Deportivos Municipales de Madrid con información de competiciones y partidos: temporada, competición, fase y grupo, jornada, equipos local y visitante, resultados, campo de juego, fecha y hora, distrito, observaciones, sistema de competición, coordenadas del campo y colores de camiseta."